name: Build Stock Kernel - Poco M4 5G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build tools
      run: |
        sudo apt-get update -qq

        sudo apt-get install -y \
        git \
        make \
        bc \
        bison \
        flex \
        cpio \
        zip \
        unzip \
        curl \
        wget \
        python3 \
        libssl-dev \
        libelf-dev \
        clang \
        lld \
        llvm \
        gcc-aarch64-linux-gnu \
        gcc-arm-linux-gnueabi \
        binutils-aarch64-linux-gnu

    - name: Clone Xiaomi Kernel Source
      run: |
        git clone --depth=1 \
        -b light-u-oss \
        https://github.com/MiCode/Xiaomi_Kernel_OpenSource \
        kernel

        du -sh kernel

    - name: Download Stock Boot
      run: |
        wget -O boot.img \
        https://github.com/testuru56-del/Stock-kernel/releases/download/Boot/boot.img

    - name: Download magiskboot
      run: |
        wget -O magiskboot \
        https://github.com/testuru56-del/Stock-kernel/releases/download/Boot/magiskboot

        chmod +x magiskboot

        ./magiskboot || true
    - name: Set defconfig
      working-directory: kernel
      run: |
        DEFCONFIG="light_defconfig"

        echo "========================================="
        echo "Using DEFCONFIG: $DEFCONFIG"
        echo "========================================="

        echo "DEFCONFIG=$DEFCONFIG" >> $GITHUB_ENV

    - name: Apply Compile Fixes
      working-directory: kernel
      run: |
        CFG="arch/arm64/configs/$DEFCONFIG"

        echo ">>> Fix 1: Missing mihw"
        mkdir -p drivers/mihw
        echo "" > drivers/mihw/Makefile
        sed -i 's/obj-$(CONFIG_MI_HARDWARE) += mihw.o//g' drivers/Makefile || true

      

        echo "Done."

    - name: Generate Config
      working-directory: kernel
      run: |
        export ARCH=arm64

        make O=out ARCH=arm64 $DEFCONFIG

        echo "Auto-answering new config questions..."
        yes "" | make O=out ARCH=arm64 oldconfig || true
        - name: Build Kernel
         working-directory: kernel
        run: |
        export ARCH=arm64
        export SUBARCH=arm64

        export CC=clang
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

        export LLVM=1
        export LLVM_IAS=1

        export HOSTCFLAGS="-fcommon -Wno-deprecated-declarations"
        export HOSTCXXFLAGS="-fcommon -Wno-deprecated-declarations"
        export KBUILD_HOSTCFLAGS="-fcommon -Wno-deprecated-declarations"

        echo "Building kernel..."

        make O=out ARCH=arm64 \
        CC=clang \
        CROSS_COMPILE=aarch64-linux-gnu- \
        CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
        LLVM=1 \
        LLVM_IAS=1 \
        KCFLAGS="-Wno-error -Wno-unused-but-set-variable -Wno-pointer-to-int-cast -Wno-unused-variable -Wno-strict-prototypes" \
        -j$(nproc) \
        Image.gz \
        dtbs

        echo "Kernel output:"
        ls -lh out/arch/arm64/boot/

    - name: Upload Raw Kernel
      uses: actions/upload-artifact@v4
      with:
        name: compiled-stock-kernel
        path: |
          kernel/out/arch/arm64/boot/Image*
          kernel/out/arch/arm64/boot/dtb*
        retention-days: 5

    - name: Verify Kernel
      run: |
        if [ ! -f kernel/out/arch/arm64/boot/Image.gz ]; then
          echo "ERROR: Image.gz not found!"
          exit 1
        fi

        file kernel/out/arch/arm64/boot/Image.gz
        ls -lh kernel/out/arch/arm64/boot/
    - name: Repack Stock Boot
      run: |
        mkdir work
        cd work

        ../magiskboot unpack ../boot.img

        cd ..

        KIMG=""

        for f in \
        kernel/out/arch/arm64/boot/Image.gz-dtb \
        kernel/out/arch/arm64/boot/Image-dtb \
        kernel/out/arch/arm64/boot/Image.gz \
        kernel/out/arch/arm64/boot/Image
        do
          if [ -f "$f" ]; then
            KIMG="$f"
            break
          fi
        done

        if [ -z "$KIMG" ]; then
          echo "ERROR: No kernel image found!"
          exit 1
        fi

        echo "Using: $KIMG"

        cp "$KIMG" work/kernel

        if [ -f kernel/out/arch/arm64/boot/dtb.img ]; then
          cp kernel/out/arch/arm64/boot/dtb.img work/dtb
          echo "Replacing DTB"
        fi

        cd work

        ../magiskboot repack ../boot.img

        mv new-boot.img ../patched_boot.img

    - name: Verify Output
      run: |
        ls -lh

        file patched_boot.img

        sha256sum patched_boot.img

    - name: Upload Boot
      uses: actions/upload-artifact@v4
      with:
        name: Poco-M4-Stock-Boot
        path: |
          patched_boot.img
          kernel/out/.config
          kernel/out/arch/arm64/boot/Image*
          kernel/out/arch/arm64/boot/dtb*
        retention-days: 7
