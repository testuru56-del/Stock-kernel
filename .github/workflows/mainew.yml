name: Poco M4 5G Pure Stock Kernel

on:
  workflow_dispatch:

env:
  DEFCONFIG: light_defconfig
  ARCH: arm64
  SUBARCH: arm64

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update

        sudo apt-get install -y \
        bc \
        bison \
        build-essential \
        ccache \
        curl \
        flex \
        gawk \
        gcc \
        g++ \
        git \
        gnupg \
        gperf \
        imagemagick \
        libelf-dev \
        liblz4-tool \
        libncurses-dev \
        libsdl1.2-dev \
        libssl-dev \
        libxml2 \
        libxml2-utils \
        lzop \
        pngcrush \
        rsync \
        schedtool \
        squashfs-tools \
        unzip \
        wget \
        xsltproc \
        zip \
        zlib1g-dev \
        python3 \
        python-is-python3 \
        clang-14 \
        llvm-14 \
        lld-14 \
        gcc-aarch64-linux-gnu \
        gcc-arm-linux-gnueabi

    - name: Clone Xiaomi Kernel
      run: |
        git clone \
        --depth=1 \
        -b light-u-oss \
        https://github.com/MiCode/Xiaomi_Kernel_OpenSource \
        kernel

    - name: Download Stock Boot
      run: |
        wget \
        -O boot.img \
        https://github.com/testuru56-del/Stock-kernel/releases/download/Boot/boot.img
  
    - name: Download magiskboot
      run: |
       wget -O magiskboot \
       https://github.com/testuru56-del/Stock-kernel/releases/download/Boot/magiskboot

       chmod +x magiskboot

       file magiskboot

       ./magiskboot --help || true
    - name: Fix Xiaomi Source
      run: |
        cd kernel

        # MIHW missing in Xiaomi OSS
        mkdir -p drivers/mihw
        touch drivers/mihw/Makefile

        sed -i '/mihw/d' drivers/Makefile || true
        sed -i '/mihw/d' drivers/Kconfig || true

        # Fix DTC yylloc
        find scripts/dtc \
        -type f \
        \( -name "*.c" -o -name "*.l" \) \
        -exec sed -i \
        's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' {} \; || true

    - name: Configure Kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        make \
        O=out \
        light_defconfig

        yes "" | make \
        O=out \
        oldconfig

    - name: Build Kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        export CC=clang-14
        export LD=ld.lld-14

        export LLVM=1
        export LLVM_IAS=1

        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

        export HOSTCFLAGS="-fcommon -Wno-error"
        export HOSTCXXFLAGS="-fcommon -Wno-error"

        export KCFLAGS="-Wno-error \
        -Wno-unused-but-set-variable \
        -Wno-unused-variable \
        -Wno-unused-function \
        -Wno-format \
        -Wno-address-of-packed-member"

        make \
        -j$(nproc) \
        O=out \
        Image.gz \
        dtbs
    - name: Verify Build
      run: |
        ls -lah kernel/out/arch/arm64/boot/

        if [ ! -f kernel/out/arch/arm64/boot/Image.gz ]; then
          echo "Kernel image not found!"
          exit 1
        fi

        file kernel/out/arch/arm64/boot/Image.gz

    - name: Prepare Boot
      run: |
        mkdir work

        cp boot.img work/
        cp kernel/out/arch/arm64/boot/Image.gz work/
        cp magiskboot work/

    - name: Unpack Boot
      run: |
        cd work

        ./magiskboot unpack boot.img

        echo "========== BOOT CONTENT =========="
        ls -lah
        echo "=================================="

    - name: Replace Kernel
      run: |
        cd work

        cp Image.gz kernel

        sync

        ls -lah

    - name: Repack Boot
      run: |
        cd work

        ./magiskboot repack boot.img

        echo "========== OUTPUT =========="
        ls -lah
        echo "============================"

        if [ ! -f new-boot.img ]; then
          echo "Repack failed!"
          exit 1
        fi

        mv new-boot.img ../stock_boot_test.img
    - name: Save Build Information
      run: |
        mkdir -p artifacts

        cp kernel/out/.config artifacts/kernel.config || true
        cp stock_boot_test.img artifacts/stock_boot_test.img || true

        if [ -f kernel/out/arch/arm64/boot/Image.gz ]; then
          cp kernel/out/arch/arm64/boot/Image.gz artifacts/
        fi

        if [ -f work/kernel ]; then
          cp work/kernel artifacts/repacked_kernel
        fi

        uname -a > artifacts/system.txt

        echo "Kernel Build Finished" > artifacts/build_status.txt
        date >> artifacts/build_status.txt

    - name: Compress Build Log
      if: always()
      run: |
        mkdir -p logs

        dmesg > logs/dmesg.txt || true

        find kernel -name "*.log" -exec cp {} logs/ \; || true

        tar -czf build_logs.tar.gz logs || true

    - name: Upload Boot Image
      uses: actions/upload-artifact@v4
      with:
        name: Poco-M4-Stock-Boot
        path: |
          stock_boot_test.img
          artifacts/*
          build_logs.tar.gz

    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Image
        path: |
          kernel/out/arch/arm64/boot/Image.gz
          kernel/out/.config

    - name: Build Summary
      if: always()
      run: |
        echo "===================================="
        echo "Build Completed"
        echo "===================================="

        if [ -f stock_boot_test.img ]; then
          echo "Flashable boot image created successfully."
        else
          echo "Boot image was NOT created."
        fi

        ls -lh
