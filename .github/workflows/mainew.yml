name: Build Stock Kernel - Poco M4 5G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            make \
            bc \
            bison \
            flex \
            cpio \
            zip \
            unzip \
            curl \
            wget \
            python3 \
            libssl-dev \
            libelf-dev \
            clang \
            llvm \
            lld \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu

      - name: Clone Xiaomi Kernel
        run: |
          git clone --depth=1 \
            -b light-u-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource \
            kernel

      - name: Download boot.img
        run: |
          wget -O boot.img \
          https://github.com/testuru56-del/Stock-kernel/releases/download/Boot/boot.img

      - name: Download magiskboot
        run: |
          wget -O magiskboot \
          https://github.com/testuru56-del/Stock-kernel/releases/download/Boot/magiskboot

          chmod +x magiskboot
          ./magiskboot --help || true

      - name: Set Defconfig
        working-directory: kernel
        run: |
          echo "DEFCONFIG=light_defconfig" >> $GITHUB_ENV
      - name: Apply Compile Fixes
        working-directory: kernel
        run: |
          CFG="arch/arm64/configs/light_defconfig"

          echo "Fixing missing mihw..."
          mkdir -p drivers/mihw
          touch drivers/mihw/Makefile

          sed -i 's/obj-$(CONFIG_MI_HARDWARE) += mihw.o//g' drivers/Makefile || true

      - name: Generate Config
        working-directory: kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64

          make O=out light_defconfig

          yes "" | make O=out olddefconfig

      - name: Show Config
        working-directory: kernel
        run: |
          echo "Kernel config generated successfully."
          ls -lh out/.config

      - name: Disable FocalTech Factory Test
        working-directory: kernel
        run: |
         sed -i 's/obj-y += focaltech_test/# obj-y += focaltech_test/' \
         drivers/input/touchscreen/mediatek/FT8722/Makefile || true  
      - name: Disable Novatek MP Test
        working-directory: kernel
        run: |
           sed -i 's/obj-y += nt36xxx_mp_ctrlram.o/# obj-y += nt36xxx_mp_ctrlram.o/' \
           drivers/input/touchscreen/mediatek/NT36672C/Makefile || true

           sed -i 's/obj-y += nt36xxx_mp_ctrlram/# obj-y += nt36xxx_mp_ctrlram/' \
           drivers/input/touchscreen/mediatek/NT36672C/Makefile || true   
      - name: Build kernel
        working-directory: kernel
        run: |
         export ARCH=arm64
         export SUBARCH=arm64
         export CC=clang
         export CROSS_COMPILE=aarch64-linux-gnu-
         export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
         export LLVM=1
         export LLVM_IAS=1

         export HOSTCFLAGS="-fcommon -Wno-deprecated-declarations"
         export HOSTCXXFLAGS="-fcommon -Wno-deprecated-declarations"
         export KBUILD_HOSTCFLAGS="-fcommon -Wno-deprecated-declarations"
         
         echo "Building kernel..."
         make O=out ARCH=arm64 \
         CC=clang \
         CROSS_COMPILE=aarch64-linux-gnu- \
         CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
         LLVM=1 LLVM_IAS=1 \
         KCFLAGS="-Wno-error \
         -Wno-frame-larger-than \
         -Wno-unused-but-set-variable \
         -Wno-pointer-to-int-cast \
         -Wno-unused-variable \
         -Wno-strict-prototypes"
         -j$(nproc) \
         Image.gz dtbs

         ls -lh out/arch/arm64/boot/

      - name: Verify Build
        working-directory: kernel
        run: |
          ls -lah out/arch/arm64/boot/

          test -f out/arch/arm64/boot/Image.gz

          file out/arch/arm64/boot/Image.gz

      - name: Upload Raw Kernel
        uses: actions/upload-artifact@v4
        with:
          name: compiled-kernel
          path: |
            kernel/out/arch/arm64/boot/Image*
            kernel/out/arch/arm64/boot/dtb*
          retention-days: 5    
          
      - name: Repack Stock Boot
        run: |
          mkdir work
          cp boot.img work/
          cp magiskboot work/

          cd work

          ../magiskboot unpack boot.img

          cd ..

          KIMG=""

          for f in \
            kernel/out/arch/arm64/boot/Image.gz-dtb \
            kernel/out/arch/arm64/boot/Image-dtb \
            kernel/out/arch/arm64/boot/Image.gz \
            kernel/out/arch/arm64/boot/Image
          do
            if [ -f "$f" ]; then
              KIMG="$f"
              break
            fi
          done

          if [ -z "$KIMG" ]; then
            echo "ERROR: Kernel image not found!"
            exit 1
          fi

          echo "Using kernel: $KIMG"

          cp "$KIMG" work/kernel

          if [ -f kernel/out/arch/arm64/boot/dtb.img ]; then
            cp kernel/out/arch/arm64/boot/dtb.img work/dtb
            echo "DTB replaced."
          fi

          cd work

          ../magiskboot repack boot.img

          if [ ! -f new-boot.img ]; then
            echo "Repack failed!"
            exit 1
          fi

          mv new-boot.img ../patched_boot.img

      - name: Verify Patched Boot
        run: |
          ls -lh
          file patched_boot.img
          sha256sum patched_boot.img

      - name: Upload Patched Boot
        uses: actions/upload-artifact@v4
        with:
          name: patched-stock-boot
          path: |
            patched_boot.img
            kernel/out/.config
            kernel/out/arch/arm64/boot/Image*
            kernel/out/arch/arm64/boot/dtb*
          retention-days: 7     
