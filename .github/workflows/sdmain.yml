name: Repack Boot Image

on:
  workflow_dispatch:

jobs:
  repack:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y wget unzip file

      - name: Download magiskboot
        run: |
          wget -O magiskboot https://github.com/Uevo001/magiskboot-linux/releases/latest/download/magiskboot-x86_64
          chmod +x magiskboot
          ./magiskboot --help || true

      - name: Verify files
        run: |
          ls -lh
          file boot.img
          file Image.gz

      - name: Unpack boot.img
        run: |
          mkdir work
          cp boot.img work/
          cp Image.gz work/
          cp magiskboot work/

          cd work

          ./magiskboot unpack boot.img

          echo "===== UNPACK RESULT ====="
          ls -lah
          file *

      - name: Replace kernel
        run: |
          cd work
          cp Image.gz kernel

      - name: Repack boot.img
        run: |
          cd work
          ./magiskboot repack boot.img

      - name: List output
        run: |
          cd work
          ls -lah

      - name: Upload boot
        uses: actions/upload-artifact@v4
        with:
          name: patched_boot
          path: |
            work/new-boot.img
            work/kernel
            work/header
            work/*
